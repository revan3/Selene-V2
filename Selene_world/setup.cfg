# Lint do Selene-World — alinha o linter ao estilo do projeto (~90 colunas) e
# silencia avisos cosméticos que poluíam a saída a cada edição (E501, etc.).
# Economia de tokens: sem isso, cada edit despejava dezenas de "line too long".
[flake8]
max-line-length = 100
extend-ignore = E501, E226, E24, W503, W504

[pycodestyle]
max-line-length = 100
ignore = E501, E226, W503
