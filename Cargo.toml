[package]
name = "selene_brain"
version = "2.0.0"
edition = "2021"

[lib]
name = "selene_kernel"
crate-type = ["cdylib"]

[dependencies]
rand = "0.8"
rand_distr = "0.4"
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
surrealdb = { version = "1.5", features = ["kv-rocksdb"] }
tokio = { version = "1.0", features = ["full"] }
pyo3 = { version = "0.22", features = ["extension-module"] }
windows = { version = "0.58", features = ["Win32_System_Performance", "Win32_Foundation", "Win32_Media"] }
wmi = "0.13"
memmap2 = "0.9"
cpal = "0.15"
spectrum-analyzer = "1.7"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = "0.4"
half = { version = "2.4", features = ["serde"] }  # ← CORRIGIDO: feature serde
bincode = "1.3"
warp = "0.3"
futures-util = "0.3"
futures = "0.3"  # ← ADICIONADO

[features]
test-bin = []
ego = []  # feature para ativar ego completo

[[bin]]
name = "selene_brain"
path = "src/main.rs"

[[bin]]
name = "check_selene"
path = "src/bin/check_selene.rs"
required-features = ["test-bin"]

[[bin]]
name = "system_checkup"
path = "src/bin/system_checkup.rs"
required-features = ["test-bin"]

[profile.release]
opt-level = 1
lto = true
codegen-units = 1
