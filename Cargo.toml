[package]
name = "selene_brain"
version = "2.0.0"
edition = "2021"

[lib]
name = "selene_kernel"
crate-type = ["cdylib"]

[dependencies]
# Diagnóstico e Logs
log = "0.4"
simplelog = "0.12"

# Matemática e Paralelismo
rand = "0.8"
rand_distr = "0.4"
rayon = "1.10"
half = { version = "2.4", features = ["serde"] }

# Serialização e Banco de Dados
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = "0.4"
surrealdb = { version = "1.5.6", features = ["kv-rocksdb", "kv-mem"] }

# Async e Network
tokio = { version = "1.0", features = ["full"] }
warp = "0.3"
futures = "0.3"
futures-util = "0.3"

# Integração Python e Sistema
pyo3 = { version = "0.22", features = ["extension-module"] }
sysinfo = "0.30"
memmap2 = "0.9"

# Sensores (Áudio e Vídeo)
cpal = "0.15"
spectrum-analyzer = "1.7"
# AJUSTADO: Adicionado feature para Windows Camera
nokhwa = { version = "0.10.10", features = ["input-msmf"] }

# Interação com Windows API
windows = { version = "0.52", features = ["Win32_Media"] }

[features]
test-bin = []
ego = []

[[bin]]
name = "selene_brain"
path = "src/main.rs"

[[bin]]
name = "check_selene"
path = "src/bin/check_selene.rs"
required-features = ["test-bin"]

[[bin]]
name = "system_checkup"
path = "src/bin/system_checkup.rs"
required-features = ["test-bin"]

[profile.release]
opt-level = 3 # Aumentado para 3 para melhor performance neural
lto = "thin"
codegen-units = 1
# Debug true ajuda o crash report a dar a linha exata do erro
debug = true 
strip = "none"